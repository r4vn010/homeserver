name: Reading

services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    ports:
      - 5000:5000
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Kiev
    volumes:
      - /srv/kavita/config:/config
      - ${USER_HOME}/Nextcloud/admin/files/Books:/data
    restart: unless-stopped
